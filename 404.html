<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – command not found</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2305080d'/%3E%3Cpath d='M8 11l6 5-6 5' stroke='%233ee8ff' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='17' y='20' width='8' height='3' rx='1.5' fill='%23ff9f45'/%3E%3C/svg%3E">
    <meta name="theme-color" content="#05080d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #05080d; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #05080d;
            color: #e9f1f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(55% 45% at 75% 12%, rgba(62, 232, 255, 0.07) 0%, transparent 65%),
                radial-gradient(70% 50% at 50% 108%, rgba(255, 159, 69, 0.06) 0%, transparent 70%);
        }
        .term {
            width: min(640px, 100%);
            background: #0b1119;
            border: 1px solid rgba(150, 220, 255, 0.12);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.6);
        }
        .term-head {
            display: flex;
            gap: 7px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(150, 220, 255, 0.09);
            background: #0f1722;
        }
        .term-head span { width: 11px; height: 11px; border-radius: 50%; background: #22303e; }
        .term-head span:first-child { background: #ff5d5d; }
        .term-body { padding: 26px 24px 30px; font-size: 0.95rem; line-height: 2; }
        .p { color: #ff9f45; }
        .cmd { color: #e9f1f8; }
        .err { color: #ff5d5d; }
        .mut { color: #8ba1b5; }
        .big {
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 800;
            color: #3ee8ff;
            text-shadow: 0 0 40px rgba(62, 232, 255, 0.35);
            line-height: 1.2;
            margin: 10px 0;
        }
        a.home {
            display: inline-block;
            margin-top: 14px;
            color: #041018;
            background: #3ee8ff;
            text-decoration: none;
            font-weight: 700;
            padding: 12px 22px;
            border-radius: 6px;
            box-shadow: 0 6px 24px rgba(62, 232, 255, 0.3);
            transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.44, 1), box-shadow 0.25s;
        }
        a.home:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(62, 232, 255, 0.45); }
        .caret {
            display: inline-block;
            width: 0.55em; height: 1.1em;
            background: #3ee8ff;
            vertical-align: text-bottom;
            animation: blink 1.05s steps(1) infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        @media (prefers-reduced-motion: reduce) { .caret { animation: none; } }
    </style>
</head>
<body>
    <main class="term">
        <div class="term-head" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="term-body">
            <div><span class="p">$</span> <span class="cmd">cd <span id="path">/diese-seite</span></span></div>
            <div class="err">bash: cd: Seite nicht gefunden</div>
            <div class="big">404</div>
            <div class="mut">Die Seite existiert nicht – aber die Startseite läuft stabil.</div>
            <a class="home" href="/">cd ~ – zur Startseite</a>
            <div style="margin-top: 18px;"><span class="p">$</span> <span class="caret" aria-hidden="true"></span></div>
        </div>
    </main>
    <script>
        var p = document.getElementById('path');
        if (p && location.pathname && location.pathname !== '/') {
            p.textContent = location.pathname;
        }
    </script>
</body>
</html>
